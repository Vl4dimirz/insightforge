# Render Blueprint — deploy the API as a free web service.
# In the Render dashboard: New → Blueprint → connect this repo, then add the
# GEMINI_API_KEY secret. (https://render.com)
services:
  - type: web
    name: insightforge-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set this secret in the Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PYTHON_VERSION
        value: 3.12.10
